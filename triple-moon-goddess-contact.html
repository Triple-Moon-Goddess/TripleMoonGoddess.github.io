<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Triple Moon Goddess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af6a;
    --gold-bright: #e8c989;
    --gold-deep: #b8945a;
    --ink: #f5e8d0;
    --ink-soft: #c9b896;
    --bg: #0a0608;
    --bg-deep: #050304;
    --line: rgba(212, 175, 106, 0.18);
    --line-strong: rgba(212, 175, 106, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(212, 175, 106, 0.08) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 75%, rgba(184, 148, 90, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(20, 12, 8, 1) 0%, var(--bg) 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 23% 17%, rgba(232, 201, 137, 0.8), transparent),
      radial-gradient(1px 1px at 67% 83%, rgba(232, 201, 137, 0.6), transparent),
      radial-gradient(1px 1px at 41% 52%, rgba(232, 201, 137, 0.5), transparent),
      radial-gradient(1px 1px at 89% 11%, rgba(232, 201, 137, 0.7), transparent),
      radial-gradient(1px 1px at 12% 73%, rgba(232, 201, 137, 0.4), transparent),
      radial-gradient(1px 1px at 78% 41%, rgba(232, 201, 137, 0.6), transparent),
      radial-gradient(2px 2px at 56% 29%, rgba(232, 201, 137, 0.9), transparent),
      radial-gradient(1px 1px at 33% 88%, rgba(232, 201, 137, 0.5), transparent),
      radial-gradient(1px 1px at 7% 38%, rgba(232, 201, 137, 0.7), transparent),
      radial-gradient(2px 2px at 94% 62%, rgba(232, 201, 137, 0.8), transparent);
    background-size: 100% 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
    animation: twinkle 8s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.4; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 32px;
  }

  .hero {
    padding: 100px 0 64px;
    text-align: center;
  }

  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.2s forwards;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '✦';
    margin: 0 14px;
    color: var(--gold-deep);
    font-size: 10px;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(2.6rem, 5.5vw, 4.5rem);
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--gold-bright);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1.1s ease-out 0.4s forwards;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--ink);
    font-weight: 300;
  }

  .hero-lead {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 1.6vw, 1.25rem);
    color: var(--ink-soft);
    max-width: 480px;
    margin: 0 auto;
    font-weight: 400;
    line-height: 1.65;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 0.6s forwards;
  }

  .ornament {
    margin: 52px auto;
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    position: relative;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 0.9s forwards;
  }

  .ornament::before {
    content: '☾';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg);
    padding: 0 18px;
    color: var(--gold);
    font-size: 18px;
  }

  .form-card {
    background: linear-gradient(180deg, rgba(20, 12, 8, 0.7) 0%, rgba(10, 6, 8, 0.95) 100%);
    border: 1px solid var(--line);
    padding: 52px 48px;
    position: relative;
    opacity: 0;
    animation: fadeUp 1s ease-out 1s forwards;
    margin-bottom: 80px;
  }

  .form-card::before,
  .form-card::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border: 1px solid var(--gold-deep);
    opacity: 0.5;
  }
  .form-card::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
  .form-card::after  { bottom: 12px; right: 12px; border-left: none; border-top: none; }

  .form-group { margin-bottom: 28px; }

  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    background: rgba(10, 6, 8, 0.8);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
    border-radius: 0;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: var(--gold-deep);
  }

  input[type="text"]::placeholder,
  input[type="email"]::placeholder,
  textarea::placeholder {
    color: rgba(201, 184, 150, 0.35);
    font-style: italic;
  }

  input[aria-invalid="true"],
  textarea[aria-invalid="true"] {
    border-color: #c0392b;
  }

  textarea {
    resize: vertical;
    min-height: 160px;
    line-height: 1.65;
  }

  .field-error {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: #e07070;
    margin-top: 6px;
    min-height: 1em;
  }

  .form-error {
    background: rgba(192, 57, 43, 0.12);
    border: 1px solid rgba(192, 57, 43, 0.4);
    color: #e07070;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: none;
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 36px 0;
  }

  .email-direct {
    text-align: center;
    margin-bottom: 0;
  }

  .email-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .email-link {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-style: italic;
    color: var(--gold-bright);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-deep);
    padding-bottom: 2px;
    transition: color 0.3s ease;
  }

  .email-link:hover { color: var(--gold); }

  .submit-btn {
    display: block;
    width: 100%;
    padding: 18px 28px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 500;
    background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold-bright) 100%);
    color: var(--bg-deep);
    border: none;
    cursor: pointer;
    transition: all 0.4s ease;
  }

  .submit-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    box-shadow: 0 0 32px rgba(212, 175, 106, 0.35);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Success state */
  [data-fs-success] {
    display: none;
    text-align: center;
    padding: 40px 0 8px;
  }

  [data-fs-success] .success-icon {
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 20px;
  }

  [data-fs-success] h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--gold-bright);
    margin-bottom: 12px;
  }

  [data-fs-success] p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 1.1rem;
  }

  @media (max-width: 540px) {
    .form-card { padding: 36px 24px; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">

  <section class="hero">
    <div class="hero-eyebrow">Get in Touch</div>
    <h1>Start the<br><em>conversation</em>.</h1>
    <p class="hero-lead">
      Questions about the platform, the work, or whether this is the right fit —
      send a message and Lisa will be in touch.
    </p>
    <div class="ornament"></div>
  </section>

  <div class="form-card">

    <!-- Success message — shown by Formspree after submission -->
    <div data-fs-success>
      <div class="success-icon">✦</div>
      <h2>Message <em>received</em>.</h2>
      <p>Lisa will be in touch soon.</p>
    </div>

    <!-- Form-level error message -->
    <div data-fs-error class="form-error"></div>

    <form id="contact-form">

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" data-fs-field placeholder="How should Lisa address you?" required>
        <span class="field-error" data-fs-error="name"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" data-fs-field placeholder="Where should Lisa reply?" required>
        <span class="field-error" data-fs-error="email"></span>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" data-fs-field placeholder="What's on your mind?" required></textarea>
        <span class="field-error" data-fs-error="message"></span>
      </div>

      <button type="submit" class="submit-btn" data-fs-submit-btn>Send Message</button>

    </form>

    <div class="divider"></div>

    <div class="email-direct">
      <div class="email-label">Or write directly</div>
      <a href="mailto:Lisa@TripleMoonGoddess.com" class="email-link">Lisa@TripleMoonGoddess.com</a>
    </div>

  </div>

</div>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contact-form', formId: 'xwvyrrbr' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
